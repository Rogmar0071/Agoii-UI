name: Build Debug APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Build APK (deterministic diagnostics)
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon 2>&1 | tee build.log

      - name: Extract Kotlin compiler errors
        if: always()
        run: |
          echo "====== KOTLIN ERRORS ======"
          grep -i "^e:" build.log || true

          echo ""
          echo "====== FIRST FAILURE CONTEXT ======"
          grep -in "^e:" build.log | head -n 1 | cut -d: -f1 | while read line; do
            start=$((line > 5 ? line - 5 : 1))
            end=$((line + 20))
            sed -n "${start},${end}p" build.log
          done || true

      # ✅ ONLY upload APK if it EXISTS
      - name: Verify APK exists
        run: |
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK NOT FOUND → BUILD FAILED"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agoii-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 🔴 Always upload logs for diagnosis
      - name: Upload build log
        if: failure()
        run: |
          echo "BUILD FAILED — check logs above"
