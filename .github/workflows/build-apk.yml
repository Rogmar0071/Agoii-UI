name: Build Debug APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean

      # 🔴 Capture FULL log to file
      - name: Build (capture log)
        run: |
          ./gradlew assembleDebug \
            --no-build-cache \
            --rerun-tasks \
            --stacktrace \
            --info \
            --warning-mode all > build.log 2>&1

      # 🔴 Extract ONLY Kotlin compiler errors (guaranteed signal)
      - name: Extract Kotlin compiler errors
        if: always()
        run: |
          echo "====== KOTLIN ERRORS ======"
          grep -E "e: .*\.kt:" build.log || true
          echo "==========================="

      # 🔴 Extract general failures
      - name: Extract failure reason
        if: always()
        run: |
          echo "====== FAILURE TRACE ======"
          grep -i "error\|exception\|failed" build.log | tail -n 50 || true
          echo "==========================="

      # 🔴 Upload full log for inspection
      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      # 🔴 Only runs if build actually succeeds
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: agoii-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
