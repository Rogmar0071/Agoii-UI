name: Build Debug APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GRADLE_OPTS: "-Dorg.gradle.internal.http.socketTimeout=60000 -Dorg.gradle.internal.http.connectionTimeout=60000"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle Properties
        run: |
          mkdir -p ~/.gradle
          cat <<'EOF' > ~/.gradle/gradle.properties
          org.gradle.jvmargs=-Xmx4096m
          android.useAndroidX=true
          EOF

      - name: Ensure Google Maven reachable
        run: |
          echo "Testing connectivity..."
          if ! nslookup dl.google.com; then
            echo "nslookup failed for dl.google.com; continuing to curl for authoritative failure"
          fi
          if ! ping -c 2 dl.google.com; then
            echo "ping failed for dl.google.com; continuing to curl for authoritative failure"
          fi
          curl -I \
            --fail \
            --show-error \
            --location \
            --retry 3 \
            --retry-delay 5 \
            --write-out '\nHTTP %{http_code}\n' \
            https://dl.google.com/dl/android/maven2/

      - name: Clean
        run: ./gradlew clean

      - name: Build APK (refresh deps)
        run: |
          ./gradlew assembleDebug \
            --refresh-dependencies \
            --stacktrace \
            --info \
            --no-daemon 2>&1 | tee build.log

      # 🔴 MINIMAL SIGNAL EXTRACTION (authoritative)
      - name: Extract failure (minimal signal)
        if: always()
        run: |
          echo "====== FIRST ERROR ======"
          grep -i -m 1 "^e:" build.log || echo "NO_KOTLIN_ERROR"

          echo ""
          echo "====== LAST FAILURE ======"
          tail -n 40 build.log

      # ✅ VERIFY APK
      - name: Verify APK exists
        run: |
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK NOT FOUND → BUILD FAILED"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agoii-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 📦 ALWAYS preserve build log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
