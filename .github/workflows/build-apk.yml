name: Build Debug APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean

      - name: Build APK (deterministic diagnostics)
        run: |
          ./gradlew assembleDebug \
            --stacktrace \
            --info \
            --no-daemon 2>&1 | tee build.log

      # 🔴 MINIMAL SIGNAL EXTRACTION (authoritative)
      - name: Extract failure (minimal signal)
        if: always()
        run: |
          echo "====== FIRST ERROR ======"
          grep -i -m 1 "^e:" build.log || echo "NO_KOTLIN_ERROR"

          echo ""
          echo "====== LAST FAILURE ======"
          tail -n 40 build.log

      # ✅ VERIFY APK
      - name: Verify APK exists
        run: |
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK NOT FOUND → BUILD FAILED"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agoii-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 📦 ALWAYS preserve build log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
