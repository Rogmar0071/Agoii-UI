name: Build Debug APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean

      # 🔴 CRITICAL: FULL LOGGING ENABLED
      - name: Build with full diagnostics
        run: |
          ./gradlew assembleDebug \
          --stacktrace \
          --info \
          --debug \
          --no-daemon \
          2>&1 | tee build.log

      # 🔴 FORCE PRINT ERRORS
      - name: Extract Kotlin errors
        run: |
          echo "====== KOTLIN ERRORS ======"
          grep -i "e:" build.log || true
          echo "====== END ======"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agoii-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 🔴 ALWAYS upload logs (even on failure)
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
